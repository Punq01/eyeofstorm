<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>storm room — eye of storm</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

    :root {
      --bg: #060608;
      --fg: #a0a0b0;
      --dim: #2a2a38;
      --dim2: #444458;
      --accent: #d0d0e8;
      --pulse: #6060a0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      
      
      cursor: crosshair;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
      pointer-events: none;
      z-index: 999;
    }

    /* ── ENTRY SCREEN ── */
    #entry-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      z-index: 100;
      transition: opacity 1.4s ease;
    }

    #entry-screen.fade-out { opacity: 0; pointer-events: none; }

    .entry-title {
      font-family: 'VT323', monospace;
      font-size: 52px;
      color: var(--accent);
      letter-spacing: 6px;
      opacity: 0;
      animation: riseIn 2s ease 0.4s forwards;
    }

    .entry-sub {
      font-size: 11px;
      color: var(--dim2);
      text-align: center;
      letter-spacing: 2px;
      line-height: 2.2;
      opacity: 0;
      animation: riseIn 2s ease 1.2s forwards;
    }

    .entry-btn {
      background: none;
      border: 1px solid var(--dim);
      color: var(--dim2);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 12px 32px;
      cursor: pointer;
      letter-spacing: 3px;
      transition: all 0.4s;
      opacity: 0;
      animation: riseIn 2s ease 2.2s forwards;
    }

    .entry-btn:hover {
      border-color: var(--pulse);
      color: var(--pulse);
      box-shadow: 0 0 28px rgba(96,96,160,0.2);
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Flash */
    #flash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.08s;
    }

    #flash.on { opacity: 1; }

    /* ── STORM ROOM ── */
    #storm-room {
      display: none;
      flex-direction: column;
      height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
    }

    #storm-room.visible { display: flex; }

    .room-header {
      padding: 20px 0 14px;
      border-bottom: 1px solid var(--dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .room-title {
      font-family: 'VT323', monospace;
      font-size: 22px;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .room-meta { font-size: 10px; color: var(--dim2); text-align: right; line-height: 2; }

    .online-dot {
      display: inline-block;
      width: 5px; height: 5px;
      background: var(--pulse);
      margin-right: 5px;
      border-radius: 50%;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--pulse); }
      50% { opacity: 0.3; box-shadow: none; }
    }

    .back-link {
      font-size: 10px;
      color: var(--dim2);
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--fg); }

    .room-warning {
      padding: 10px 0;
      font-size: 10px;
      color: var(--dim2);
      letter-spacing: 1px;
      border-bottom: 1px solid var(--dim);
      flex-shrink: 0;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 8px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    #messages::-webkit-scrollbar { width: 2px; }
    #messages::-webkit-scrollbar-thumb { background: var(--dim); }

    .message {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      animation: msgIn 0.3s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-id {
      font-family: 'VT323', monospace;
      font-size: 15px;
      color: var(--dim2);
      flex-shrink: 0;
      width: 52px;
      padding-top: 2px;
      letter-spacing: 1px;
    }

    .msg-id.mine { color: var(--pulse); }

    .msg-body { flex: 1; }

    .msg-text {
      color: var(--fg);
      font-size: 13px;
      line-height: 1.7;
      word-break: break-word;
    }

    .msg-text.mine { color: var(--accent); }

    .msg-time {
      font-size: 10px;
      color: var(--dim);
      margin-top: 4px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      color: var(--dim2);
      font-size: 11px;
      letter-spacing: 2px;
      line-height: 3;
      margin: auto;
      opacity: 0;
      animation: riseIn 1s ease 0.5s forwards;
    }

    /* Input */
    .input-area {
      padding: 16px 0 28px;
      border-top: 1px solid var(--dim);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .session-label {
      font-family: 'VT323', monospace;
      font-size: 15px;
      color: var(--pulse);
      flex-shrink: 0;
      padding-bottom: 8px;
      width: 52px;
      letter-spacing: 1px;
    }

    #msg-input {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 1px solid var(--dim);
      color: var(--fg);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      padding: 6px 0;
      outline: none;
      resize: none;
      line-height: 1.6;
      transition: border-color 0.2s;
    }

    #msg-input:focus { border-bottom-color: var(--dim2); }
    #msg-input::placeholder { color: var(--dim); }

    .send-btn {
      background: none;
      border: none;
      color: var(--dim2);
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      padding: 4px 0 4px 12px;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .send-btn:hover { color: var(--fg); }

    /* Particles */
    .particle {
      position: fixed;
      width: 2px; height: 2px;
      background: var(--pulse);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      animation: drift linear infinite;
    }

    @keyframes drift {
      0%   { opacity: 0; transform: translateY(0) translateX(0); }
      10%  { opacity: 0.25; }
      90%  { opacity: 0.08; }
      100% { opacity: 0; transform: translateY(-110vh) translateX(15px); }
    }
  </style>
</head>
<body>

<div id="flash"></div>

<!-- Entry -->
<div id="entry-screen">
  <div class="entry-title">eye of storm</div>
  <div class="entry-sub">
    анонимная комната<br>
    сообщения исчезают через час<br>
    имён нет — только присутствие
  </div>
  <button class="entry-btn" id="entry-btn" onclick="enterStorm()">[ войти в шторм ]</button>
</div>

<!-- Room -->
<div id="storm-room">
  <div class="room-header">
    <div class="room-title">// storm room</div>
    <div class="room-meta">
      <div><span class="online-dot"></span><span id="online-count">—</span> внутри</div>
      <div id="session-display">§···</div>
      <a href="index.html" class="back-link">← выход</a>
    </div>
  </div>

  <div class="room-warning">
    сообщения живут 1 час · анонимно · без архива · что было в шторме — осталось в шторме
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      тишина.<br>
      ты первый здесь.
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="session-label" id="my-session-label">§···</div>
      <textarea id="msg-input" rows="1" placeholder="говори..."></textarea>
      <button class="send-btn" onclick="sendMessage()">→</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ybvlyvoulxlkffzbygdw.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlidmx5dm91bHhsa2ZmemJ5Z2R3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTgwMjAsImV4cCI6MjA5Nzg3NDAyMH0.8Sjo9OXHYy7rXAa3AhWc2WOV8Ft_6cf3H2karVfrX2Q';

  // iOS Safari viewport fix
  function fixVH() {
    document.getElementById("storm-room").style.height = window.innerHeight + "px";
  }
  window.addEventListener("resize", fixVH);
  fixVH();

  const sessionId = Math.random().toString(36).substr(2, 4).toUpperCase();
  let pollInterval = null;
  const seenIds = new Set();

  function enterStorm() {
    const btn = document.getElementById('entry-btn');
    btn.textContent = '[ ······ ]';
    btn.disabled = true;

    // double flash
    const flash = document.getElementById('flash');
    setTimeout(() => {
      flash.classList.add('on');
      setTimeout(() => flash.classList.remove('on'), 90);
      setTimeout(() => flash.classList.add('on'), 180);
      setTimeout(() => flash.classList.remove('on'), 260);
    }, 300);

    setTimeout(() => {
      document.getElementById('entry-screen').classList.add('fade-out');
    }, 500);

    setTimeout(() => {
      document.getElementById('entry-screen').style.display = 'none';
      const room = document.getElementById('storm-room');
      room.classList.add('visible');
      document.getElementById('session-display').textContent = '§' + sessionId;
      document.getElementById('my-session-label').textContent = '§' + sessionId;
      spawnParticles();
      initRoom();
    }, 1900);
  }

  async function api(path, method, body) {
    const opts = {
      method: method || 'GET',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json'
      }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
    if ((method || 'GET') === 'GET') return res.json();
    return res;
  }

  async function loadMessages() {
    const oneHourAgo = new Date(Date.now() - 3600000).toISOString();
    let msgs;
    try {
      msgs = await api('storm_messages?created_at=gt.' + encodeURIComponent(oneHourAgo) + '&order=created_at.asc&limit=100');
    } catch(e) { return; }

    if (!Array.isArray(msgs) || msgs.length === 0) return;

    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const container = document.getElementById('messages');
    let added = false;

    msgs.forEach(msg => {
      if (seenIds.has(msg.id)) return;
      seenIds.add(msg.id);

      const isMine = msg.session_id === sessionId;
      const t = new Date(msg.created_at);
      const timeStr = String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0');

      const div = document.createElement('div');
      div.className = 'message';
      div.dataset.id = msg.id;
      div.innerHTML =
        '<div class="msg-id' + (isMine ? ' mine' : '') + '">§' + esc(msg.session_id) + '</div>' +
        '<div class="msg-body">' +
          '<div class="msg-text' + (isMine ? ' mine' : '') + '">' + esc(msg.text) + '</div>' +
          '<div class="msg-time">' + timeStr + ' · исчезнет через час</div>' +
        '</div>';

      container.appendChild(div);
      added = true;
    });

    if (added) container.scrollTop = container.scrollHeight;

    // online count: unique sessions in last 10 min
    const tenMinAgo = new Date(Date.now() - 600000).toISOString();
    const recent = msgs.filter(m => m.created_at > tenMinAgo);
    const sessions = new Set(recent.map(m => m.session_id));
    sessions.add(sessionId);
    document.getElementById('online-count').textContent = sessions.size;
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || text.length > 280) return;
    input.value = '';
    input.style.height = 'auto';
    try {
      await api('storm_messages', 'POST', { session_id: sessionId, text: text });
      await loadMessages();
    } catch(e) {}
  }

  function initRoom() {
    loadMessages();
    pollInterval = setInterval(loadMessages, 4000);
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  document.getElementById('msg-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  document.getElementById('msg-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function spawnParticles() {
    for (let i = 0; i < 14; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.cssText =
          'left:' + Math.random() * 100 + 'vw;' +
          'top:' + (60 + Math.random() * 40) + 'vh;' +
          'animation-duration:' + (18 + Math.random() * 22) + 's;' +
          'animation-delay:' + (Math.random() * 8) + 's';
        document.body.appendChild(p);
      }, i * 150);
    }
  }
</script>

</body>
</html>
